<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
body{background:#c9ccd6;font-family:'Inter','Helvetica Neue',Arial,sans-serif;padding:40px;display:flex;gap:36px;align-items:flex-start;}
.col{display:flex;flex-direction:column;align-items:center;gap:8px;}
.cap{font-weight:800;color:#23262e;font-size:15px;}
.cap small{display:block;font-weight:600;color:#5a606b;font-size:12px;margin-top:2px;max-width:330px;text-align:center;}
.phone{width:360px;height:760px;border-radius:44px;overflow:hidden;position:relative;background:#F3F0E9;box-shadow:0 24px 60px rgba(16,24,40,.35),0 0 0 10px #16181D,0 0 0 12px #2a2d35;}
.notch{position:absolute;top:13px;left:50%;transform:translateX(-50%);width:110px;height:28px;background:#16181D;border-radius:18px;z-index:50;}
.hud{position:absolute;top:30px;left:14px;right:14px;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:blur(18px);border-radius:22px;padding:12px 16px;box-shadow:0 10px 26px rgba(31,41,55,.16);display:flex;justify-content:space-between;align-items:center;color:#1c1e24;}
.hud .t{font-size:17px;font-weight:800;letter-spacing:-.3px;}
.hud .t span{display:block;font-size:10px;color:#8a8fa0;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.hud .m{text-align:right;}.hud .m b{font-size:16px;font-weight:800;color:#3B82F6;}.hud .m span{display:block;font-size:9px;color:#8a8fa0;text-transform:uppercase;letter-spacing:.4px;font-weight:700;}
.mapwrap{position:absolute;inset:0;}.mapwrap svg{position:absolute;inset:0;width:100%;height:100%;}
.scores{position:absolute;left:14px;right:14px;bottom:26px;z-index:30;background:rgba(255,255,255,.94);backdrop-filter:blur(18px);border-radius:22px;padding:14px 16px;box-shadow:0 12px 30px rgba(31,41,55,.18);color:#1c1e24;}
.scores h5{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#8a8fa0;margin-bottom:9px;}
.bar{display:flex;height:12px;border-radius:7px;overflow:hidden;margin-bottom:10px;}
.bar i{display:block;height:100%;}
.legend{display:flex;justify-content:space-between;}
.legend .l{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#3a3f4c;}
.legend .d{width:9px;height:9px;border-radius:3px;}
.zoom{position:absolute;right:16px;top:50%;transform:translateY(-50%);z-index:30;display:flex;flex-direction:column;gap:8px;}
.zoom div{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,.94);box-shadow:0 8px 20px rgba(31,41,55,.16);display:flex;align-items:center;justify-content:center;font-weight:800;color:#3a3f4c;font-size:17px;}
.me{position:absolute;z-index:28;width:16px;height:16px;border-radius:50%;background:#3B82F6;box-shadow:0 0 0 4px #fff,0 4px 10px rgba(31,41,55,.3);transform:translate(-50%,-50%);}
</style></head><body>

<div class="col"><div class="cap">Dézoom ville · plateau d'hexagones <small>Les veines s'agrègent en hexagones doux (opacité = force de contrôle). Lecture du score d'un coup d'œil.</small></div>
<div class="phone">
  <div class="mapwrap"><svg id="m" viewBox="0 0 360 760" preserveAspectRatio="xMidYMid slice"></svg></div>
  <div class="me" style="left:236px;top:354px;"></div>
  <div class="notch"></div>
  <div class="hud"><div class="t">Asnières-sur-Seine<span>Saison 1 · J-12</span></div><div class="m"><b>42 %</b><span>Les Vagues</span></div></div>
  <div class="zoom"><div>+</div><div>−</div></div>
  <div class="scores">
    <h5>Contrôle de la ville</h5>
    <div class="bar"><i style="width:42%;background:#3B82F6"></i><i style="width:23%;background:#FF4D5E"></i><i style="width:19%;background:#F5B82E"></i><i style="width:16%;background:#2EB789"></i></div>
    <div class="legend">
      <span class="l"><span class="d" style="background:#3B82F6"></span>Vagues 42 %</span>
      <span class="l"><span class="d" style="background:#FF4D5E"></span>Braises 23 %</span>
      <span class="l"><span class="d" style="background:#F5B82E"></span>Soleils 19 %</span>
      <span class="l"><span class="d" style="background:#2EB789"></span>Pousses 16 %</span>
    </div>
  </div>
</div></div>

<script>
function makeRng(s){s=s>>>0;return()=>{s=(s*1664525+1013904223)>>>0;return s/4294967296;};}
const TEAM={blue:'#3B82F6',red:'#FF4D5E',yellow:'#F5B82E',green:'#2EB789'};
function smooth(p){if(p.length<2)return'';let d=`M ${p[0].x.toFixed(1)} ${p[0].y.toFixed(1)}`;for(let i=0;i<p.length-1;i++){const p0=p[i-1]||p[i],p1=p[i],p2=p[i+1],p3=p[i+2]||p2;const c1x=p1.x+(p2.x-p0.x)/6,c1y=p1.y+(p2.y-p0.y)/6,c2x=p2.x-(p3.x-p1.x)/6,c2y=p2.y-(p3.y-p1.y)/6;d+=` C ${c1x.toFixed(1)} ${c1y.toFixed(1)} ${c2x.toFixed(1)} ${c2y.toFixed(1)} ${p2.x.toFixed(1)} ${p2.y.toFixed(1)}`;}return d;}
function hexPath(cx,cy,r){let d='';for(let k=0;k<6;k++){const a=Math.PI/180*(60*k-30),x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);d+=(k?'L':'M')+x.toFixed(1)+' '+y.toFixed(1);}return d+'Z';}
(function(){
  const s=document.getElementById('m');const rnd=makeRng(913);
  const C={land:'#F3F0E9',block:'#EAE6DD',roadCase:'#DDD7CC',road:'#FFFFFF',water:'#BFE0F2',waterEdge:'#A5CFE8',park:'#CFE8C7',parkEdge:'#B7DBAA',label:'#7a7466'};
  let h=`<defs><filter id="hl" x="-20%" y="-20%" width="140%" height="140%"><feMorphology operator="dilate" radius="1.6" in="SourceAlpha"/><feFlood flood-color="${C.land}"/><feComposite in2="SourceAlpha" operator="in" result="ha"/><feMerge><feMergeNode in="ha"/><feMergeNode in="ha"/></feMerge></filter></defs>`;
  h+=`<rect width="360" height="760" fill="${C.land}"/>`;
  // city-scale: tighter blocks, thinner streets
  for(let gy=-1;gy<22;gy++)for(let gx=-1;gx<11;gx++){if(rnd()<0.22)continue;const x=gx*36+rnd()*5+3,y=gy*35+rnd()*5,w=27+rnd()*7,ht=25+rnd()*7;h+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${ht.toFixed(1)}" rx="4.5" fill="${C.block}"/>`;}
  h+=`<path d="M14 96 q40 -26 78 -5 q30 19 16 58 q-14 41 -64 36 q-49 -6 -46 -49 q2 -28 16 -40z" fill="${C.park}" stroke="${C.parkEdge}" stroke-width="1.2"/>`;
  h+=`<path d="M250 480 q44 -20 70 8 q22 26 2 60 q-22 36 -64 24 q-42 -12 -36 -52 q4 -26 28 -40z" fill="${C.park}" stroke="${C.parkEdge}" stroke-width="1.2"/>`;
  h+=`<path d="M-30 656 C 70 628, 150 690, 240 656 S 400 620, 430 664 L430 712 C 330 702, 230 744, 120 712 S -30 712, -30 700 z" fill="${C.water}" stroke="${C.waterEdge}" stroke-width="1.3"/>`;
  const streets=[];
  for(let r=-12;r<=772;r+=35){const amp=4+rnd()*9,fq=0.013+rnd()*0.013,ph=rnd()*7;const pts=[];for(let x=-30;x<=390;x+=40)pts.push({x,y:r+Math.sin(x*fq+ph)*amp});streets.push(pts);}
  for(let c=-12;c<=372;c+=34){const amp=4+rnd()*9,fq=0.013+rnd()*0.013,ph=rnd()*7;const pts=[];for(let y=-30;y<=792;y+=40)pts.push({x:c+Math.sin(y*fq+ph)*amp,y});streets.push(pts);}
  let base='',road='';
  for(const pts of streets){const d=smooth(pts);base+=`<path d="${d}" fill="none" stroke="${C.roadCase}" stroke-width="2.6" stroke-linecap="round"/>`;road+=`<path d="${d}" fill="none" stroke="${C.road}" stroke-width="1.4" stroke-linecap="round"/>`;}
  h+=base+road;
  // hex aggregation of territory_cells
  const clusters=[{cx:235,cy:380,r:165,team:'blue'},{cx:96,cy:215,r:108,team:'red'},{cx:282,cy:585,r:104,team:'yellow'},{cx:66,cy:545,r:96,team:'green'},{cx:120,cy:400,r:62,team:'blue'}];
  const regionAt=(x,y)=>{let b=null,bc=0;for(const c of clusters){const d=Math.hypot(x-c.cx,y-c.cy);if(d>c.r)continue;const cl=1-d/c.r;if(cl>bc){bc=cl;b=c;}}return b?{team:b.team,close:bc}:null;};
  const R=13,dx=R*1.732,dy=R*1.5;let g='';
  for(let row=0;row<42;row++){for(let col=-1;col<18;col++){
    const cx=col*dx+(row%2?dx/2:0),cy=row*dy;if(cx<-10||cx>372||cy>760)continue;
    const r=regionAt(cx,cy);if(!r)continue;
    if(rnd()<0.34+0.6*r.close){const v=TEAM[r.team];
      g+=`<path d="${hexPath(cx,cy,R-1.6)}" fill="${v}" fill-opacity="${(0.14+0.34*r.close).toFixed(2)}" stroke="${v}" stroke-opacity="${(0.30+0.40*r.close).toFixed(2)}" stroke-width="1.1" stroke-linejoin="round"/>`;}}}
  h+=g;
  // contested seam: bicolor dashed hexes between blue & red
  for(const p of [[152,300],[176,288],[160,322]]){
    h+=`<path d="${hexPath(p[0],p[1],R-1.6)}" fill="none" stroke="#3B82F6" stroke-width="1.6" stroke-dasharray="4 4"/>`;
    h+=`<path d="${hexPath(p[0],p[1],R-1.6)}" fill="none" stroke="#FF4D5E" stroke-width="1.6" stroke-dasharray="4 4" stroke-dashoffset="4"/>`;}
  const lab=(x,y,t,sz)=>`<text x="${x}" y="${y}" font-size="${sz||10.5}" font-weight="700" fill="${C.label}" text-anchor="middle" filter="url(#hl)">${t}</text>`;
  h+=lab(63,140,'Parc Robinson',10)+lab(165,706,'La Seine',11)+lab(95,250,'Quartier Gare',10)+lab(250,420,'Centre-ville',10)+lab(290,560,'Bords de Seine',10);
  s.innerHTML=h;
})();
</script></body></html>
